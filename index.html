<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Portfolio — ML Engineer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; cursor: none; }
html, body { height: 100vh; overflow: hidden; }
body { background: #080a10; color: #e2e8f5; font-family: 'DM Mono', monospace; }

/* ── CURSOR ── */
#cdot {
  position: fixed; z-index: 9999; pointer-events: none;
  width: 7px; height: 7px; background: #fff; border-radius: 50%;
  transform: translate(-50%,-50%); will-change: left,top;
  transition: transform 0.18s ease, opacity 0.2s ease;
}
#cring {
  position: fixed; z-index: 9998; pointer-events: none;
  width: 38px; height: 38px; background: #fff;
  border-radius: 50%; mix-blend-mode: exclusion;
  transform: translate(-50%,-50%); will-change: left,top;
  transition: width 0.45s cubic-bezier(0.16,1,0.3,1), height 0.45s cubic-bezier(0.16,1,0.3,1);
}
#cdot.hov  { transform: translate(-50%,-50%) scale(0); }
#cring.hov { width: 70px; height: 70px; }

/* ── GRAIN ── */
#grain {
  position: fixed; inset: -200%; width: 400%; height: 400%;
  pointer-events: none; z-index: 300; opacity: 0.038;
  animation: grain 8s steps(10) infinite;
  background-size: 256px 256px; background-repeat: repeat;
}
@keyframes grain {
  0%,100%{transform:translate(0,0)}10%{transform:translate(-5%,-5%)}
  20%{transform:translate(-10%,5%)}30%{transform:translate(5%,-10%)}
  40%{transform:translate(-5%,15%)}50%{transform:translate(-10%,5%)}
  60%{transform:translate(15%,0)}70%{transform:translate(0,10%)}
  80%{transform:translate(-15%,0)}90%{transform:translate(10%,5%)}
}

/* ── LOADER ── */
#loader {
  position:fixed; inset:0; z-index:600;
  background:#080a10;
  display:flex; align-items:center; justify-content:center;
  transition:opacity 0.8s ease;
}
#loader.done { opacity:0; pointer-events:none; }
.ldr-inner { display:flex; flex-direction:column; align-items:center; gap:1.4rem; }
.ldr-logo { font-size:13px; color:#7ef2b0; letter-spacing:0.1em; font-weight:500; margin-bottom:0.6rem; }
.ldr-pct-row { display:flex; align-items:baseline; gap:3px; }
#ldr-num { font-family:'Syne',sans-serif; font-size:64px; font-weight:800; color:#eef2ff; letter-spacing:-0.05em; line-height:1; min-width:3ch; text-align:right; }
.ldr-sym { font-family:'Syne',sans-serif; font-size:28px; font-weight:800; color:#7ef2b0; }
.ldr-track { width:180px; height:1px; background:#16202f; overflow:hidden; }
.ldr-fill { height:100%; background:#7ef2b0; width:0%; transition:width 0.5s cubic-bezier(0.16,1,0.3,1); }
.ldr-label { font-size:10px; color:#2e3f54; letter-spacing:0.22em; text-transform:uppercase; }

/* ── INTRO ── */
#intro {
  position: fixed; inset: 0; z-index: 500;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; transition: transform 1.1s cubic-bezier(0.76,0,0.24,1);
}
#intro.exit { transform: translateY(-100%); }
#intro::after {
  content:''; position:absolute; inset:0; z-index:2; pointer-events:none;
  background: radial-gradient(ellipse at center, transparent 25%, rgba(8,10,16,0.88) 100%);
}
#fog { position:absolute; inset:0; width:100%; height:100%; filter:blur(52px); }
.qwrap {
  position:relative; z-index:3; text-align:center;
  opacity:0; transform:translateY(20px);
  transition: opacity 1.3s ease, transform 1.3s ease;
  padding:0 3rem; max-width:640px;
}
.qwrap.show { opacity:1; transform:translateY(0); }
.qwrap.fade { opacity:0; transform:translateY(-14px); transition:opacity 0.9s ease,transform 0.9s ease; }
.qt { font-size:clamp(13px,1.7vw,17px); color:rgba(226,232,245,0.72); font-style:italic; font-weight:300; line-height:1.9; }
.qa { margin-top:1.4rem; font-size:11px; color:#7ef2b0; letter-spacing:0.2em; }

/* ── NAV ── */
nav {
  position:fixed; inset:0 0 auto 0; z-index:200; height:56px;
  display:flex; align-items:center; justify-content:space-between; padding:0 2.8rem;
  background:rgba(8,10,16,0.82); backdrop-filter:blur(18px);
  border-bottom:0.5px solid #16202f;
  opacity:0; transition:opacity 0.9s ease;
}
nav.show { opacity:1; }
.logo { color:#7ef2b0; font-size:13px; letter-spacing:0.1em; font-weight:500; }
.nlinks { display:flex; gap:2.2rem; }
.nlinks a { color:#3e5068; font-size:11px; letter-spacing:0.14em; text-decoration:none; text-transform:uppercase; transition:color 0.2s; }
.nlinks a:hover { color:#7ef2b0; }
.nlinks a.active { color:#7ef2b0; }

/* ── PROGRESS ── */
#progress {
  position:fixed; top:56px; left:0; right:0; z-index:199;
  height:1.5px; background:#7ef2b0; transform-origin:left; transform:scaleX(0);
}

/* ── DOTS ── */
#dots {
  position:fixed; right:1.8rem; top:50%; transform:translateY(-50%);
  z-index:150; display:flex; flex-direction:column; gap:10px;
  opacity:0; transition:opacity 0.7s ease;
}
#dots.show { opacity:1; }
.dot {
  width:5px; height:5px; border-radius:50%;
  background:#16202f; border:0.5px solid #3e5068;
  transition:background 0.3s, transform 0.3s, border-radius 0.3s;
}
.dot.active { background:#7ef2b0; border-color:#7ef2b0; transform:scaleY(2.4); border-radius:3px; }

/* ── KB HINT ── */
#kb-hint {
  position:fixed; bottom:2rem; left:50%; transform:translateX(-50%);
  z-index:150; font-size:10px; color:#1e2d3d; letter-spacing:0.14em;
  display:flex; align-items:center; gap:8px;
  opacity:0; transition:opacity 0.5s ease; pointer-events:none;
}
#kb-hint.show { opacity:1; }
.kb-key { display:inline-flex; align-items:center; justify-content:center; width:18px; height:18px; border:0.5px solid #1e2d3d; border-radius:3px; font-size:10px; color:#1e2d3d; }

/* ── SCROLLER ── */
#scroller { height:100vh; overflow-y:scroll; scroll-snap-type:y mandatory; opacity:0; transition:opacity 0.9s ease; }
#scroller.show { opacity:1; }
.panel { height:100vh; scroll-snap-align:start; overflow:hidden; }

/* ── HERO ── */
#hero { display:flex; align-items:center; padding:0 7rem; background:#080a10; position:relative; }
#hero::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background-image:radial-gradient(circle, rgba(126,242,176,0.07) 1px, transparent 1px);
  background-size:36px 36px;
}
#hero::after {
  content:''; position:absolute; inset:0; pointer-events:none;
  background:radial-gradient(ellipse at 70% 50%, transparent 40%, #080a10 80%);
}
.hi { position:relative; z-index:1; }
.he   { font-size:11px; color:#7ef2b0; letter-spacing:0.2em; text-transform:uppercase; margin-bottom:1rem; opacity:0; transform:translateY(14px); transition:opacity 0.8s,transform 0.8s; }
.hn   { font-family:'Syne',sans-serif; font-size:clamp(58px,9.5vw,116px); font-weight:800; color:#eef2ff; line-height:0.92; letter-spacing:-0.04em; margin-bottom:1.4rem; opacity:0; transform:translateY(14px); transition:opacity 0.8s 0.14s,transform 0.8s 0.14s; }
.hn em { color:#7ef2b0; font-style:normal; }
.hrol { font-size:12px; color:#3e5068; letter-spacing:0.08em; margin-bottom:1.4rem; opacity:0; transform:translateY(14px); transition:opacity 0.8s 0.28s,transform 0.8s 0.28s; }
.hdesc { font-size:13px; color:#324055; line-height:2; max-width:400px; font-weight:300; margin-bottom:2.2rem; opacity:0; transform:translateY(14px); transition:opacity 0.8s 0.42s,transform 0.8s 0.42s; }
.hcta { display:flex; gap:12px; opacity:0; transform:translateY(14px); transition:opacity 0.8s 0.56s,transform 0.8s 0.56s; }
#hero.go .he,#hero.go .hn,#hero.go .hrol,#hero.go .hdesc,#hero.go .hcta { opacity:1; transform:translateY(0); }
.sdown { position:absolute; bottom:2.2rem; left:7rem; z-index:1; display:flex; align-items:center; gap:10px; font-size:10px; color:#243040; letter-spacing:0.18em; text-transform:uppercase; opacity:0; transition:opacity 0.8s 0.8s; }
#hero.go .sdown { opacity:1; }
.sline { width:36px; height:0.5px; background:#243040; }

/* ── BUTTONS ── */
.btnp { padding:10px 22px; background:#7ef2b0; color:#080a10; border:none; border-radius:4px; font-size:11px; font-weight:500; font-family:'DM Mono',monospace; letter-spacing:0.08em; text-decoration:none; display:inline-block; transition:opacity 0.2s; }
.btnp:hover { opacity:0.82; }
.btng { padding:10px 22px; background:transparent; color:#7ef2b0; border:0.5px solid #2b5e42; border-radius:4px; font-size:11px; font-weight:500; font-family:'DM Mono',monospace; letter-spacing:0.08em; text-decoration:none; display:inline-block; transition:border-color 0.2s,background 0.2s; }
.btng:hover { border-color:#7ef2b0; background:rgba(126,242,176,0.05); }

/* ── PROJECT PANELS ── */
.pp { display:grid; grid-template-columns:1fr 1fr; height:100vh; }
.pp.fl { direction:rtl; }
.pp.fl > * { direction:ltr; }
.imgside { position:relative; overflow:hidden; height:100vh; cursor:pointer; }
/* parallax wrapper — JS animates translateY, no CSS transition */
.img-wrap {
  position:absolute; top:-15%; left:0;
  width:100%; height:130%;
  will-change:transform;
}
.img-wrap img {
  width:100%; height:100%; object-fit:cover; display:block;
  filter:brightness(0.6) saturate(0.72);
  clip-path:inset(0 100% 0 0);
  transition:clip-path 1.3s cubic-bezier(0.16,1,0.3,1),
             filter 0.5s ease,
             transform 0.7s cubic-bezier(0.16,1,0.3,1);
}
.panel.revealed .img-wrap img { clip-path:inset(0 0% 0 0); }
.pp:hover .img-wrap img { transform:scale(1.07); filter:brightness(0.78) saturate(0.95); }
.iov { position:absolute; inset:0; background:linear-gradient(to right,rgba(8,10,16,0.55),transparent 60%); pointer-events:none; }
.pp.fl .iov { background:linear-gradient(to left,rgba(8,10,16,0.55),transparent 60%); }
.inum { position:absolute; bottom:1.8rem; left:2rem; font-family:'Syne',sans-serif; font-size:96px; font-weight:800; color:rgba(126,242,176,0.04); line-height:1; letter-spacing:-0.04em; pointer-events:none; user-select:none; }

/* view-case label on image hover */
.view-case {
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  opacity:0; transition:opacity 0.3s ease; pointer-events:none;
  background:rgba(8,10,16,0.35);
}
.view-case span {
  font-size:11px; color:#7ef2b0; letter-spacing:0.22em; text-transform:uppercase;
  border:0.5px solid #7ef2b0; border-radius:4px; padding:10px 20px;
  backdrop-filter:blur(4px);
}
.imgside:hover .view-case { opacity:1; }

.txtside { background:#0d1119; padding:0 4rem; display:flex; flex-direction:column; justify-content:center; gap:1.25rem; height:100vh; border-left:0.5px solid #16202f; }
.pp.fl .txtside { border-left:none; border-right:0.5px solid #16202f; }
.peyebrow { display:flex; align-items:center; gap:10px; }
.pnum { font-size:10px; color:#7ef2b0; letter-spacing:0.2em; }
.pcat { font-size:10px; padding:3px 9px; border-radius:100px; background:rgba(126,242,176,0.05); color:#7ef2b0; border:0.5px solid #2b5e42; letter-spacing:0.1em; }
.ptitle { font-family:'Syne',sans-serif; font-size:clamp(30px,3.2vw,50px); font-weight:800; color:#eef2ff; line-height:1.06; letter-spacing:-0.03em; }
.ptitle em { color:#7ef2b0; font-style:normal; }
.divl { width:36px; height:0.5px; background:#16202f; }
.pdesc { font-size:12px; color:#324055; line-height:2; max-width:360px; font-weight:300; }
.pstats { display:flex; gap:2rem; }
.sv  { font-size:19px; font-weight:500; color:#7ef2b0; font-family:'Syne',sans-serif; display:block; }
.stl { font-size:10px; color:#2e3f54; letter-spacing:0.12em; text-transform:uppercase; display:block; margin-top:2px; }
.ptags { display:flex; flex-wrap:wrap; gap:6px; }
.tag { font-size:10px; padding:3px 9px; border-radius:3px; background:#0f1520; color:#2e3f54; border:0.5px solid #16202f; letter-spacing:0.06em; }
.plinks { display:flex; gap:9px; flex-wrap:wrap; }
.plk { display:inline-flex; align-items:center; gap:6px; font-size:11px; color:#2e3f54; text-decoration:none; border:0.5px solid #16202f; border-radius:4px; padding:7px 13px; letter-spacing:0.06em; transition:color 0.2s,border-color 0.2s,background 0.2s; }
.plk:hover { color:#7ef2b0; border-color:#2b5e42; background:rgba(126,242,176,0.04); }
.plk svg,.ct-link svg { width:13px; height:13px; stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0; }

/* ── PROJECT DETAIL OVERLAY ── */
#overlay {
  position:fixed; inset:0; z-index:400;
  display:grid; grid-template-columns:1fr 1fr;
  opacity:0; pointer-events:none;
  transition:opacity 0.6s cubic-bezier(0.16,1,0.3,1);
}
#overlay.open { opacity:1; pointer-events:all; }

/* left: image pane — clips in from left edge */
.ov-img {
  position:relative; overflow:hidden;
  background:#050709;
  clip-path:inset(0 0 0 100%);
  transition:clip-path 0.8s cubic-bezier(0.16,1,0.3,1);
}
#overlay.open .ov-img { clip-path:inset(0 0 0 0%); }
.ov-img img { width:100%; height:100%; object-fit:cover; filter:brightness(0.7) saturate(0.85); display:block; }
.ov-img-shade { position:absolute; inset:0; background:linear-gradient(to right,transparent 60%,rgba(5,7,9,0.7)); pointer-events:none; }

/* right: content pane — slides in from right */
.ov-content {
  background:#080a10; border-left:0.5px solid #16202f;
  padding:5rem 4rem 4rem 4rem;
  overflow-y:auto;
  display:flex; flex-direction:column; gap:2rem;
  transform:translateX(40px);
  transition:transform 0.8s 0.1s cubic-bezier(0.16,1,0.3,1);
}
#overlay.open .ov-content { transform:translateX(0); }

/* close button */
.ov-close {
  position:fixed; top:1.4rem; right:2rem; z-index:401;
  width:38px; height:38px; border-radius:50%;
  border:0.5px solid #16202f; background:#080a10;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; opacity:0;
  transition:opacity 0.4s 0.3s ease, background 0.2s, border-color 0.2s;
}
#overlay.open .ov-close { opacity:1; }
.ov-close:hover { background:#0f1520; border-color:#2b5e42; }
.ov-close svg { width:14px; height:14px; stroke:#7ef2b0; fill:none; stroke-width:1.8; stroke-linecap:round; }

/* overlay content sections */
.ov-eyebrow { display:flex; align-items:center; gap:10px; }
.ov-num { font-size:10px; color:#7ef2b0; letter-spacing:0.2em; }
.ov-cat { font-size:10px; padding:3px 9px; border-radius:100px; background:rgba(126,242,176,0.05); color:#7ef2b0; border:0.5px solid #2b5e42; letter-spacing:0.1em; }
.ov-title { font-family:'Syne',sans-serif; font-size:clamp(32px,4vw,56px); font-weight:800; color:#eef2ff; line-height:1.05; letter-spacing:-0.03em; }
.ov-title em { color:#7ef2b0; font-style:normal; }
.ov-divl { width:36px; height:0.5px; background:#16202f; flex-shrink:0; }

.ov-section-label { font-size:10px; color:#7ef2b0; letter-spacing:0.18em; text-transform:uppercase; margin-bottom:0.6rem; }
.ov-section-body { font-size:12px; color:#3d5268; line-height:2; font-weight:300; }

.ov-phases { display:flex; flex-direction:column; gap:1rem; }
.ov-phase { display:grid; grid-template-columns:80px 1fr; gap:1rem; align-items:start; }
.ov-phase-num { font-size:10px; color:#2b5e42; letter-spacing:0.1em; padding-top:2px; }
.ov-phase-text { font-size:12px; color:#3d5268; line-height:1.9; font-weight:300; }
.ov-phase-text strong { color:#7ef2b0; font-weight:500; }

.ov-metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; }
.ov-metric { background:#0d1119; border:0.5px solid #16202f; border-radius:6px; padding:1.2rem 1rem; }
.ov-metric-val { font-family:'Syne',sans-serif; font-size:24px; font-weight:800; color:#7ef2b0; display:block; }
.ov-metric-lbl { font-size:10px; color:#2e3f54; letter-spacing:0.1em; text-transform:uppercase; display:block; margin-top:4px; }

.ov-stack { display:flex; flex-wrap:wrap; gap:7px; }
.ov-stack span { font-size:10px; padding:4px 10px; border-radius:3px; background:#0f1520; color:#3d5268; border:0.5px solid #16202f; letter-spacing:0.06em; }

.ov-links { display:flex; gap:10px; flex-wrap:wrap; margin-top:0.5rem; }
.ov-link { display:inline-flex; align-items:center; gap:7px; font-size:11px; color:#2e3f54; text-decoration:none; border:0.5px solid #16202f; border-radius:4px; padding:8px 15px; letter-spacing:0.06em; transition:color 0.2s,border-color 0.2s,background 0.2s; }
.ov-link:hover { color:#7ef2b0; border-color:#2b5e42; background:rgba(126,242,176,0.04); }
.ov-link svg { width:13px; height:13px; stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0; }

/* ── ABOUT PANEL ── */
.about-wrap { display:grid; grid-template-columns:1fr 1fr; height:100vh; }
.about-deco { position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center; border-right:0.5px solid #16202f; background:#080a10; }
.about-deco::before { content:''; position:absolute; inset:0; pointer-events:none; background-image:radial-gradient(circle,rgba(126,242,176,0.07) 1px,transparent 1px); background-size:36px 36px; }
.abt-deco-num { font-family:'Syne',sans-serif; font-size:clamp(120px,18vw,200px); font-weight:800; color:rgba(126,242,176,0.04); line-height:1; letter-spacing:-0.06em; user-select:none; pointer-events:none; position:relative; z-index:1; }
.abt-tag { position:absolute; bottom:2.8rem; left:3rem; font-size:10px; color:#2b5e42; letter-spacing:0.2em; text-transform:uppercase; }
.about-content { background:#0d1119; padding:0 4rem; display:flex; flex-direction:column; justify-content:center; gap:1.4rem; height:100vh; border-left:0.5px solid #16202f; overflow-y:auto; }
.abt-eyebrow { font-size:10px; color:#7ef2b0; letter-spacing:0.2em; text-transform:uppercase; }
.abt-title { font-family:'Syne',sans-serif; font-size:clamp(28px,3.2vw,46px); font-weight:800; color:#eef2ff; line-height:1.08; letter-spacing:-0.03em; }
.abt-title em { color:#7ef2b0; font-style:normal; }
.abt-divl { width:36px; height:0.5px; background:#16202f; }
.abt-bio { font-size:12px; color:#324055; line-height:2; max-width:380px; font-weight:300; }
.abt-skills { display:flex; flex-direction:column; gap:12px; }
.skill-grp { display:flex; flex-direction:column; gap:6px; }
.skill-lbl { font-size:10px; color:#7ef2b0; letter-spacing:0.14em; text-transform:uppercase; }
.skill-chips { display:flex; flex-wrap:wrap; gap:6px; }
.skill-chips span { font-size:10px; padding:3px 9px; border-radius:3px; background:#0f1520; color:#2e3f54; border:0.5px solid #16202f; letter-spacing:0.06em; }

/* ── CONTACT PANEL ── */
.contact-wrap { height:100vh; position:relative; overflow:hidden; display:flex; align-items:center; padding:0 8rem; background:#080a10; }
.contact-wrap::before { content:''; position:absolute; inset:0; pointer-events:none; background-image:radial-gradient(circle,rgba(126,242,176,0.06) 1px,transparent 1px); background-size:36px 36px; }
.contact-wrap::after { content:''; position:absolute; inset:0; pointer-events:none; background:radial-gradient(ellipse at 75% 50%, transparent 35%, #080a10 72%); }
.ct-deco { position:absolute; bottom:-1rem; right:3rem; font-family:'Syne',sans-serif; font-size:clamp(100px,18vw,200px); font-weight:800; color:rgba(126,242,176,0.03); letter-spacing:-0.06em; line-height:1; user-select:none; pointer-events:none; }
.ct-inner { position:relative; z-index:1; display:flex; flex-direction:column; gap:1.4rem; max-width:560px; }
.ct-eyebrow { font-size:10px; color:#7ef2b0; letter-spacing:0.2em; text-transform:uppercase; }
.ct-title { font-family:'Syne',sans-serif; font-size:clamp(40px,6vw,76px); font-weight:800; color:#eef2ff; line-height:1.0; letter-spacing:-0.04em; }
.ct-title em { color:#7ef2b0; font-style:normal; }
.ct-divl { width:36px; height:0.5px; background:#16202f; }
.ct-sub { font-size:13px; color:#324055; line-height:1.9; max-width:420px; font-weight:300; }
.ct-links { display:flex; flex-wrap:wrap; gap:10px; margin-top:0.5rem; }

/* ── Build project title HTML ── */
function titleHTML(lines) {
  return lines.map((l, i) =>
    i === lines.length - 1
      ? '<em>' + l + '</em>'
      : l
  ).join('<br>');
}

  const n = CONFIG.projects.length;
  const items = [
    { label:'home',     panel:0 },
    { label:'projects', panel:1 },
    { label:'about',    panel:n + 1 },
    { label:'contact',  panel:n + 2 },
  ];
  document.getElementById('nav-links').innerHTML = items.map(item =>
    `<a href="#" onclick="goTo(${item.panel});return false;" data-panel="${item.panel}">${item.label}</a>`
  ).join('');
}

/* ── Render dot nav ── */

  const el = document.getElementById('dots');

  ).join('');
}

    ].filter(Boolean).join('');

  <section class="panel" data-project="${i}">
    <div class="pp${flip ? ' fl' : ''}">
      <div class="imgside" onclick="openOverlay(${i})">
        <div class="img-wrap"><img src="${p.image}" alt="${p.title.join(' ')}"></div>

      ).join('')}</div>
    </div>
    <div><p class="ov-section-label">Stack</p><div class="ov-stack">${p.fullStack.map(s => `<span>${s}</span>`).join('')}</div></div>
    <div class="ov-links">${links}</div>`;

  overlay.classList.add('open');
  overlayOpen = true;
  overlay.querySelectorAll('a').forEach(el => {
    el.addEventListener('mouseenter', () => { cring.classList.add('hov'); cdot.classList.add('hov'); });
    el.addEventListener('mouseleave', () => { cring.classList.remove('hov'); cdot.classList.remove('hov'); });
  });
};
function closeOverlay() {
  overlay.classList.remove('open');
  overlayOpen = false;
}
ovClose.addEventListener('click', closeOverlay);

/* ── GRAIN ── */
(function(){
  const c = document.createElement('canvas'); c.width = c.height = 256;
  const x = c.getContext('2d'), d = x.createImageData(256,256);
  for (let i = 0; i < d.data.length; i += 4) {
    const v = Math.random()*255|0;
    d.data[i] = d.data[i+1] = d.data[i+2] = v; d.data[i+3] = 255;
  }
  x.putImageData(d, 0, 0);
  document.getElementById('grain').style.backgroundImage = 'url(' + c.toDataURL() + ')';
})();

/* ── CURSOR ── */
const cdot = document.getElementById('cdot'), cring = document.getElementById('cring');
let mx = innerWidth/2, my = innerHeight/2, rx = mx, ry = my;
document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
document.addEventListener('mouseleave', () => { cdot.style.opacity='0'; cring.style.opacity='0'; });
document.addEventListener('mouseenter', () => { cdot.style.opacity='1'; cring.style.opacity='1'; });
function bindHover(root) {
  root.querySelectorAll('a,button,.dot,.imgside').forEach(el => {
    el.addEventListener('mouseenter', () => { cring.classList.add('hov'); cdot.classList.add('hov'); });
    el.addEventListener('mouseleave', () => { cring.classList.remove('hov'); cdot.classList.remove('hov'); });
  });
}
bindHover(document);
(function cursorLoop() {
  rx += (mx-rx)*0.11; ry += (my-ry)*0.11;
  cdot.style.left = mx+'px'; cdot.style.top = my+'px';
  cring.style.left = rx+'px'; cring.style.top = ry+'px';
  requestAnimationFrame(cursorLoop);
})();

/* ── SCRAMBLE ── */
function scramble(el) {
  const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!#%&';
  const orig = el.innerHTML, segs = [];
  let rem = orig;
  while (rem.length) {
    if (rem[0] === '<') { const e = rem.indexOf('>')+1; segs.push({t:false,s:rem.slice(0,e)}); rem = rem.slice(e); }
    else { const n = rem.indexOf('<'); const ch = n===-1?rem:rem.slice(0,n); segs.push({t:true,s:ch}); rem = n===-1?'':rem.slice(n); }
  }
  let frame = 0; const total = 26;
  const iid = setInterval(() => {
    const prog = frame/total;
    el.innerHTML = segs.map(seg => {
      if (!seg.t) return seg.s;
      return seg.s.split('').map((c,i) => {
        if (c===' '||c==='\n') return c;
        if (i/seg.s.length < prog) return c;
        return CHARS[Math.random()*CHARS.length|0];
      }).join('');
    }).join('');
    if (++frame > total) { el.innerHTML = orig; clearInterval(iid); }
  }, 42);
}

/* ── COUNTERS ── */
function animateCounters(panel) {
  panel.querySelectorAll('.sv').forEach(el => {
    const orig = el.textContent;
    const m = orig.match(/^([^0-9]*)(\d+(?:\.\d+)?)(.*)$/);
    if (!m || isNaN(parseFloat(m[2]))) return;
    const pre = m[1], num = parseFloat(m[2]), suf = m[3];
    let start = null;
    requestAnimationFrame(function step(ts) {
      if (!start) start = ts;
      const p = Math.min((ts-start)/1400, 1);
      el.textContent = pre + Math.round((1-Math.pow(1-p,3))*num) + suf;
      if (p < 1) requestAnimationFrame(step); else el.textContent = orig;
    });
  });
}

/* ── FOG ── */
const fogC = document.getElementById('fog'), fc = fogC.getContext('2d');
let W, H;
function resize() { W = fogC.width = innerWidth; H = fogC.height = innerHeight; }
resize(); window.addEventListener('resize', resize);
const puffs = Array.from({length:32}, () => ({
  x:Math.random()*innerWidth, y:Math.random()*innerHeight,
  rx:180+Math.random()*260,   ry:100+Math.random()*160,
  ang:Math.random()*Math.PI,  vx:(Math.random()-0.5)*0.22, vy:(Math.random()-0.5)*0.11,
  h:195+Math.random()*40,     s:14+Math.random()*18,
  l:7+Math.random()*9,        a:0.14+Math.random()*0.28,
}));
let fogOn = false, t = 0;
function fogLoop() {
  if (!fogOn) return;
  fc.clearRect(0,0,W,H); fc.fillStyle='#080a10'; fc.fillRect(0,0,W,H);
  puffs.forEach(p => {
    fc.save(); fc.translate(p.x,p.y); fc.rotate(p.ang+t*0.00025); fc.scale(1,p.ry/p.rx);
    const g = fc.createRadialGradient(0,0,0,0,0,p.rx);
    g.addColorStop(0,    'hsla('+p.h+','+p.s+'%,'+p.l+'%,'+p.a+')');
    g.addColorStop(0.55, 'hsla('+p.h+','+(p.s-4)+'%,'+(p.l-2)+'%,'+(p.a*0.45)+')');
    g.addColorStop(1,    'hsla('+p.h+','+p.s+'%,'+p.l+'%,0)');
    fc.beginPath(); fc.arc(0,0,p.rx,0,Math.PI*2); fc.fillStyle=g; fc.fill(); fc.restore();
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<-p.rx)p.x=W+p.rx; if(p.x>W+p.rx)p.x=-p.rx;
    if(p.y<-p.ry)p.y=H+p.ry; if(p.y>H+p.ry)p.y=-p.ry;
  });
  t++; requestAnimationFrame(fogLoop);
}

/* ── REFS ── */
const intro    = document.getElementById('intro');
const qwrap    = document.getElementById('qwrap');
const nav      = document.getElementById('nav');
const dotsEl   = document.getElementById('dots');
const scroller = document.getElementById('scroller');
const hero     = document.getElementById('hero');
const kbHint   = document.getElementById('kb-hint');

/* ── INTRO (called after preload) ── */
function startIntro() {
  fogOn = true; fogLoop();
  setTimeout(() => qwrap.classList.add('show'), 900);
  setTimeout(() => qwrap.classList.add('fade'), 3000);
  setTimeout(() => {
    intro.classList.add('exit');
    nav.classList.add('show');
    dotsEl.classList.add('show');
    scroller.classList.add('show');
  }, 4000);
  setTimeout(() => hero.classList.add('go'), 4300);
  setTimeout(() => kbHint.classList.add('show'), 5000);
  setTimeout(() => { fogOn = false; intro.style.display = 'none'; }, 5200);
}

/* ── PRELOADER ── */
const ldrFill  = document.getElementById('ldr-fill');
const ldrNum   = document.getElementById('ldr-num');
const loaderEl = document.getElementById('loader');
const imgURLs  = CONFIG.projects.map(p => p.image);
const TOTAL    = imgURLs.length + 1;
let loaded = 0, displayN = 0, targetN = 0;
const loadStart = Date.now();

function tickNum() {
  if (displayN < targetN) {
    displayN = Math.min(displayN+2, targetN);
    ldrNum.textContent = displayN;
    requestAnimationFrame(tickNum);
  }
}
function onAsset() {
  loaded++;
  const pct = Math.round(loaded/TOTAL*100);
  ldrFill.style.width = pct + '%';
  targetN = pct;
  tickNum();
  if (loaded === TOTAL) {
    const wait = Math.max(0, 900-(Date.now()-loadStart));
    setTimeout(() => {
      loaderEl.classList.add('done');
      setTimeout(startIntro, 800);
    }, wait);
  }
}
imgURLs.forEach(src => { const i = new Image(); i.onload = i.onerror = onAsset; i.src = src; });
document.fonts.ready.then(onAsset);

/* ── PARALLAX ── */
const PARA = 0.12;
function updateParallax() {
  const st = scroller.scrollTop;
  document.querySelectorAll('.img-wrap').forEach(wrap => {
    const panel = wrap.closest('.panel');
    if (!panel) return;
    wrap.style.transform = 'translateY(' + ((panel.offsetTop-st)*PARA) + 'px)';
  });
}

/* ── SCROLL + KEYBOARD + DOTS + IO ── */
const panels   = () => Array.from(scroller.querySelectorAll('.panel'));
const dotsAll  = () => Array.from(document.querySelectorAll('.dot'));
const navLinks = () => Array.from(document.querySelectorAll('.nlinks a'));
const prog     = document.getElementById('progress');
let currentPanel = 0;

window.goTo = i => {
  if (overlayOpen) return;
  const ps = panels();
  currentPanel = Math.max(0, Math.min(i, ps.length-1));
  ps[currentPanel].scrollIntoView({ behavior:'smooth' });
};

document.addEventListener('keydown', e => {
  if (overlayOpen) { if (e.key==='Escape') closeOverlay(); return; }
  if (e.key==='ArrowDown'||e.key==='j') { e.preventDefault(); goTo(currentPanel+1); }
  else if (e.key==='ArrowUp'||e.key==='k') { e.preventDefault(); goTo(currentPanel-1); }
});

const io = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting && e.intersectionRatio >= 0.5) {
      const ps  = panels();
      const ds  = dotsAll();
      const idx = ps.indexOf(e.target);
      currentPanel = idx;
      ds.forEach((d,i) => d.classList.toggle('active', i===idx));
      navLinks().forEach(a => a.classList.toggle('active', parseInt(a.dataset.panel)===idx));
      if (!e.target.classList.contains('revealed')) {
        e.target.classList.add('revealed');
        const title = e.target.querySelector('.ptitle');
        if (title) setTimeout(() => scramble(title), 380);
        setTimeout(() => animateCounters(e.target), 600);
      }
    }
  });
}, { root: scroller, threshold: 0.5 });

/* observe panels after DOM is built */
panels().forEach(p => io.observe(p));

scroller.addEventListener('scroll', () => {
  const pct = scroller.scrollTop / (scroller.scrollHeight - scroller.clientHeight);
  prog.style.transform = 'scaleX(' + (isNaN(pct) ? 0 : pct) + ')';
  requestAnimationFrame(updateParallax);
}, { passive: true });
</script>
</body>
